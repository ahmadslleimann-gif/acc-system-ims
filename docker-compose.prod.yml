# Production stack for a single server (e.g. a DigitalOcean droplet).
#   frontend (nginx)  ->  serves the built SPA on port 80 and proxies /api,/admin,/static,/media to backend
#   backend  (gunicorn) -> Django API on 8000 (migrates + seeds on start)
#   db       (postgres) -> data with a persistent volume
#
# Configure secrets in a .env file next to this file (see .env.prod.example), then:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      USE_SQLITE: "False"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      # Host port is configurable so this app can coexist with your other projects.
      # Set APP_PORT in .env (default 8080). Access at http://YOUR_IP:APP_PORT
      - "${APP_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  media:
