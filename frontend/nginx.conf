server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # API + Django admin + static/media are served by the backend container.
    location /api/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /admin/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /static/ { proxy_pass http://backend:8000; }
    location /media/  { proxy_pass http://backend:8000; }

    # Everything else is the React single-page app.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
