# Cloudflare Worker config to serve the built React SPA (frontend/dist) as
# static assets, with single-page-app routing fallback.
#
# Cloudflare → Workers → this service → Settings → Build:
#   Build command:  npm --prefix frontend install && npm --prefix frontend run build
#   Deploy command: npx wrangler deploy
#   Root directory: / (repo root)
# Add a build variable:  VITE_API_BASE_URL = https://<your-railway-domain>/api
name = "acc-system-ims"
compatibility_date = "2024-12-30"

[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"
